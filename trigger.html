<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #78350F;
      }
      .trigger-strip {
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, #78350F 0%, #F59E0B 100%);
        opacity: 0.6;
        transition: opacity 0.2s;
        cursor: pointer;
      }
      .trigger-strip:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="trigger-strip"></div>
    <script type="module" src="/src/trigger.ts"></script>
  </body>
</html>
