<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        width: 200px;
        height: 6px;
      }
      body {
        width: 200px;
        height: 6px;
        overflow: hidden;
        background: transparent;
        border-radius: 0 0 4px 4px;
      }
      .trigger-strip {
        width: 200px;
        height: 6px;
        border-radius: 0 0 4px 4px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(234, 134, 6, 0.85) 19%,
          rgba(234, 134, 6, 1) 50%,
          rgba(234, 134, 6, 0.85) 81%,
          transparent 100%
        );
        opacity: 0.6;
        transition: opacity 0.2s;
        cursor: pointer;
      }
      .trigger-strip:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="trigger-strip"></div>
    <script type="module" src="/src/trigger.ts"></script>
  </body>
</html>
